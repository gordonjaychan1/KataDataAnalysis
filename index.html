<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2024–25 WKF Kata Analysis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div>
        <h1>2024–25 WKF Season — Kata Analysis</h1>
        <p class="header-sub">Male &amp; Female Kata · 9 Tournaments · <span id="meta-performances">—</span> Performances</p>
      </div>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="kata">Kata</button>
    <button class="tab-btn" data-tab="karateka">Karateka</button>
    <button class="tab-btn" data-tab="tournaments">Tournaments</button>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════ KATA TAB -->
  <section id="tab-kata" class="tab-content active">

    <div class="controls-bar">
      <div class="gender-toggle">
        <button class="gender-btn active" data-gender="male">Male</button>
        <button class="gender-btn" data-gender="female">Female</button>
      </div>
      <input type="text" id="kata-search" class="search-input" placeholder="Search kata…" />
    </div>

    <!-- search result card -->
    <div id="kata-card" class="detail-card hidden"></div>

    <!-- master table -->
    <div class="table-wrapper">
      <table id="kata-table" class="data-table sortable">
        <thead>
          <tr>
            <th data-col="Kata" class="sort-asc">Kata</th>
            <th data-col="Kata_Tier">Tier</th>
            <th data-col="Performances" class="num">Perfs</th>
            <th data-col="Unique_Karateka" class="num">Athletes</th>
            <th data-col="Mean_Score" class="num">Avg Score</th>
            <th data-col="Median_Score" class="num">Median</th>
            <th data-col="Min_Score" class="num">Min</th>
            <th data-col="Max_Score" class="num">Max</th>
            <th data-col="Std_Dev" class="num">Std Dev</th>
            <th data-col="Win_Rate" class="num">Win Rate</th>
          </tr>
        </thead>
        <tbody id="kata-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════ KARATEKA TAB -->
  <section id="tab-karateka" class="tab-content hidden">

    <div class="controls-bar">
      <div class="gender-toggle">
        <button class="gender-btn active" data-gender="male">Male</button>
        <button class="gender-btn" data-gender="female">Female</button>
      </div>
      <input type="text" id="karateka-search" class="search-input" placeholder="Search karateka…" />
    </div>

    <!-- search result card -->
    <div id="karateka-card" class="detail-card hidden"></div>

    <div class="table-wrapper">
      <table id="karateka-table" class="data-table sortable">
        <thead>
          <tr>
            <th data-col="Karateka" class="sort-asc">Karateka</th>
            <th data-col="Country">Country</th>
            <th data-col="Performances" class="num">Perfs</th>
            <th data-col="Tournaments_Attended" class="num">Tournaments</th>
            <th data-col="Mean_Score" class="num">Avg Score</th>
            <th data-col="Median_Score" class="num">Median</th>
            <th data-col="Min_Score" class="num">Min</th>
            <th data-col="Max_Score" class="num">Max</th>
            <th data-col="Win_Rate" class="num">Win Rate</th>
          </tr>
        </thead>
        <tbody id="karateka-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════ TOURNAMENTS TAB -->
  <section id="tab-tournaments" class="tab-content hidden">

    <div class="controls-bar">
      <div class="gender-toggle">
        <button class="gender-btn active" data-gender="both">Both</button>
        <button class="gender-btn" data-gender="male">Male</button>
        <button class="gender-btn" data-gender="female">Female</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="tournaments-table" class="data-table sortable">
        <thead>
          <tr>
            <th data-col="Tournament" class="sort-asc">Tournament</th>
            <th data-col="Gender">Gender</th>
            <th data-col="Total_Performances" class="num">Performances</th>
            <th data-col="Unique_Karateka" class="num">Athletes</th>
            <th data-col="Unique_Kata" class="num">Unique Kata</th>
            <th data-col="Avg_Score" class="num">Avg Score</th>
          </tr>
        </thead>
        <tbody id="tournaments-tbody"></tbody>
      </table>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
